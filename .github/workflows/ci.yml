name: newPrime CI & Deploy

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Flutter einrichten
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Plattform-Dateien (web) erzeugen
        run: flutter create --platforms=web .

      - name: Kaputte Standard-Test-Vorlage entfernen
        run: rm -f test/widget_test.dart

      - name: Pakete laden
        run: flutter pub get

      - name: Analyse
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Web-Build
        # --pwa-strategy=none deaktiviert den Service Worker, damit Updates
        # sofort bei einem einzigen Reload erscheinen (kein "zweimal neu laden").
        run: flutter build web --release --pwa-strategy=none --base-href "/Project-newPrime/"

      - name: Pages konfigurieren
        uses: actions/configure-pages@v5

      - name: Build hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Auf GitHub Pages veroeffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
